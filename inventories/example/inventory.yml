---
# Example Inventory for Headscale + Authelia deployment
# Copy this file and modify for your environment

all:
  children:
    headscale_servers:
      hosts:
        # Replace with your server hostname or IP
        headscale-server:
          ansible_host: 192.168.1.100
          ansible_user: ansible
          ansible_python_interpreter: /usr/bin/python3
