---
# Headscale + Authelia Stack - Default Variables
# Override these in your group_vars or host_vars

# ==============================================================================
# DOMAIN CONFIGURATION
# ==============================================================================

# Public hostnames for services
headscale_authelia_hostname: "headscale.example.com"
headscale_authelia_auth_hostname: "auth.example.com"

# Base domain for Headscale MagicDNS
headscale_authelia_base_domain: "hs.example.com"

# ==============================================================================
# STACK CONFIGURATION
# ==============================================================================

# Stack naming and user
headscale_authelia_stack_name: "headscale-authelia"
headscale_authelia_stack_user: "hsauthelia"

# Directory paths
headscale_authelia_base_data_dir: "/data"
headscale_authelia_volumes_dir: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}/volumes"
headscale_authelia_certs_dir: "{{ headscale_authelia_volumes_dir }}/certs"

# ==============================================================================
# TRAEFIK CONFIGURATION
# ==============================================================================

# Deploy Traefik as part of this stack (true) or use existing instance (false)
headscale_authelia_deploy_traefik: false

# Traefik network name
# - When headscale_authelia_deploy_traefik=true: network is created by this stack
# - When headscale_authelia_deploy_traefik=false: must be an existing external network
headscale_authelia_traefik_network: "traefik_default"

# Traefik certificate resolver name
headscale_authelia_traefik_certresolver: "letsencrypt"

# ------------------------------------------------------------------------------
# Traefik Container Settings (only used when headscale_authelia_deploy_traefik=true)
# ------------------------------------------------------------------------------

# Traefik Docker image
headscale_authelia_traefik_image: "traefik:v3.2"

# Traefik container name
headscale_authelia_traefik_container_name: "traefik"

# ACME email for Let's Encrypt certificates
headscale_authelia_traefik_acme_email: "admin@example.com"

# Use Let's Encrypt staging server (set true for testing to avoid rate limits)
headscale_authelia_traefik_acme_staging: false

# HTTP port (for ACME HTTP-01 challenge and redirect)
headscale_authelia_traefik_http_port: 80

# HTTPS port
headscale_authelia_traefik_https_port: 443

# Enable Traefik dashboard
headscale_authelia_traefik_dashboard_enabled: false

# Traefik log level (DEBUG, INFO, WARN, ERROR)
headscale_authelia_traefik_log_level: "INFO"

# ==============================================================================
# HEADSCALE CONFIGURATION
# ==============================================================================

# Headscale ports
headscale_authelia_http_port: 8080
headscale_authelia_grpc_port: 50443

# OIDC client configuration
headscale_authelia_oidc_client_id: "headscale-client"

# ==============================================================================
# ACME / CERTIFICATE AUTHORITY
# ==============================================================================

# ACME directory (use step-ca for internal or Let's Encrypt for external)
headscale_authelia_acme_directory: "https://acme-v02.api.letsencrypt.org/directory"
headscale_authelia_acme_account_key_path: "/etc/ssl/acme-account.key"

# ==============================================================================
# NETWORK CONFIGURATION
# ==============================================================================

# OPNsense/gateway IP for DNS resolution
headscale_authelia_opnsense_ip: "192.168.1.1"

# Tailscale router subnet routes to advertise
headscale_authelia_tailscale_routes:
  - "192.168.1.0/24"

# Tailscale router macvlan configuration
headscale_authelia_tailscale_router_ip: "192.168.1.222"
headscale_authelia_tailscale_router_subnet: "192.168.1.0/24"
headscale_authelia_tailscale_router_gateway: "192.168.1.1"

# Docker host physical interface for macvlan
headscale_authelia_docker_host_interface: "eth0"

# ==============================================================================
# AUTHELIA USER CONFIGURATION
# ==============================================================================

# Define users with their hashed passwords
# Generate hash: docker run --rm authelia/authelia:latest authelia crypto hash generate argon2 --password "YourPassword"
headscale_authelia_auth_users: []
#  - username: "admin"
#    displayname: "Administrator"
#    password: "{{ vault_hashed_pass_admin }}"
#    email: "admin@example.com"
#    groups:
#      - "admins"

# ==============================================================================
# SAFETY CONTROLS
# ==============================================================================

# Set to true to wipe existing volumes and regenerate all keys
# WARNING: This deletes all data including databases, keys, and certificates
headscale_authelia_force_wipe_volumes: false
