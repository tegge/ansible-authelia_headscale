---
# Post-Deployment Tasks

- name: Check if deployment made changes
  ansible.builtin.set_fact:
    deployment_changed: "{{ headscale_authelia_compose_res.changed | default(false) }}"

- name: Build port forwarding message
  ansible.builtin.set_fact:
    port_forward_msg: >-
      {{ ['   WAN:' + (headscale_authelia_traefik_http_port | string) + '/TCP -> SERVER_IP:' + (headscale_authelia_traefik_http_port | string) + ' (HTTP)',
          '   WAN:' + (headscale_authelia_traefik_https_port | string) + '/TCP -> SERVER_IP:' + (headscale_authelia_traefik_https_port | string) + ' (HTTPS)']
        if (headscale_authelia_deploy_traefik | default(false) | bool)
        else ['   WAN:443/TCP -> SERVER_IP:443 (HTTPS)'] }}

- name: Display deployment information (only if changes were made)
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "  Deployment Complete - Changes Applied"
      - "=========================================="
      - ""
      - "Services:"
      - "  - https://{{ headscale_authelia_auth_hostname }} (Authelia)"
      - "  - https://{{ headscale_authelia_hostname }} (Headscale)"
      - ""
      - "Traefik Mode: {{ 'DEPLOYED with stack' if (headscale_authelia_deploy_traefik | default(false) | bool) else 'EXTERNAL (' + headscale_authelia_traefik_network + ')' }}"
      - "Certificate Resolver: {{ headscale_authelia_traefik_certresolver }}"
      - "Stack Name: {{ headscale_authelia_stack_name }}"
      - ""
      - "Next Steps:"
      - ""
      - "1. Configure DNS A records pointing to your server:"
      - "   {{ headscale_authelia_auth_hostname }} -> YOUR_SERVER_IP"
      - "   {{ headscale_authelia_hostname }} -> YOUR_SERVER_IP"
      - ""
      - "2. Configure port forwarding if behind NAT:"
      - "{{ port_forward_msg | join('\n') }}"
      - "   WAN:3478/UDP -> SERVER_IP:3478 (DERP/STUN)"
      - ""
      - "3. Enroll 2FA: https://{{ headscale_authelia_auth_hostname }}"
      - ""
      - "4. Connect VPN Clients:"
      - "   tailscale login --login-server=https://{{ headscale_authelia_hostname }}"
      - "   tailscale up --accept-routes"
      - ""
      - "=========================================="
  when: deployment_changed | bool
