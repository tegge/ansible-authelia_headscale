---
# Docker Compose Deployment

- name: Check if router pre-auth key file exists
  ansible.builtin.stat:
    path: "{{ headscale_authelia_volumes_dir }}/headscale_authelia_router_preauth_key"
  register: headscale_authelia_preauth_key_file

- name: Build list of services for initial deployment
  ansible.builtin.set_fact:
    headscale_authelia_initial_services: "{{ ['traefik'] if headscale_authelia_deploy_traefik | default(false) | bool else [] }} + ['headscale', 'authelia']"

- name: Deploy core services first (for key generation)
  community.docker.docker_compose_v2:
    project_src: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}"
    files:
      - "{{ headscale_authelia_stack_name }}.yml"
    services: "{{ headscale_authelia_initial_services }}"
    pull: always
    state: present
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Wait for Headscale to be ready (for key generation)
  ansible.builtin.pause:
    seconds: 10
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Create router user in Headscale
  ansible.builtin.command:
    cmd: "docker exec headscale_{{ headscale_authelia_stack_name }} headscale users create router"
  register: headscale_authelia_create_router
  changed_when: "'User created' in headscale_authelia_create_router.stdout"
  failed_when:
    - headscale_authelia_create_router.rc != 0
    - "'UNIQUE constraint failed' not in headscale_authelia_create_router.stderr"
    - "'already exists' not in headscale_authelia_create_router.stderr"
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Get router user ID
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      docker exec headscale_{{ headscale_authelia_stack_name }} headscale users list -o json | jq -r '.[] | select(.name=="router") | .id'
    executable: /bin/bash
  register: headscale_authelia_router_user_id
  changed_when: false
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Generate pre-auth key for router with tag
  ansible.builtin.command:
    cmd: >-
      docker exec headscale_{{ headscale_authelia_stack_name }}
      headscale preauthkeys create
      --user {{ headscale_authelia_router_user_id.stdout }}
      --reusable --expiration 365d --tags tag:router
  register: headscale_authelia_preauth_key_output
  changed_when: true
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Store pre-auth key persistently
  ansible.builtin.copy:
    content: "{{ headscale_authelia_preauth_key_output.stdout_lines[-1] }}"
    dest: "{{ headscale_authelia_volumes_dir }}/headscale_authelia_router_preauth_key"
    owner: "{{ headscale_authelia_service_user }}"
    group: "{{ headscale_authelia_service_user }}"
    mode: "0400"
  when: not headscale_authelia_preauth_key_file.stat.exists

- name: Read pre-auth key from file
  ansible.builtin.slurp:
    src: "{{ headscale_authelia_volumes_dir }}/headscale_authelia_router_preauth_key"
  register: headscale_authelia_preauth_key_content

- name: Set pre-auth key fact
  ansible.builtin.set_fact:
    headscale_authelia_router_preauth_key: "{{ headscale_authelia_preauth_key_content.content | b64decode | trim }}"

- name: Create .env file with pre-auth key
  ansible.builtin.copy:
    content: "TS_AUTHKEY={{ headscale_authelia_router_preauth_key }}\n"
    dest: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}/.env"
    owner: "{{ headscale_authelia_service_user }}"
    group: "{{ headscale_authelia_service_user }}"
    mode: "0600"

- name: Deploy or update containers with Compose v2
  community.docker.docker_compose_v2:
    project_src: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}"
    files:
      - "{{ headscale_authelia_stack_name }}.yml"
    pull: always
    state: present
    recreate: always
    wait: true
    wait_timeout: 120
  register: headscale_authelia_compose_res

- name: Assert core services running
  ansible.builtin.assert:
    that:
      - "'headscale' in (headscale_authelia_compose_res.containers | map(attribute='Service'))"
      - "'authelia' in (headscale_authelia_compose_res.containers | map(attribute='Service'))"
      - "'tailscale-router' in (headscale_authelia_compose_res.containers | map(attribute='Service'))"
      - (headscale_authelia_compose_res.containers | selectattr('Service', 'equalto', 'headscale') | first).State == 'running'
      - (headscale_authelia_compose_res.containers | selectattr('Service', 'equalto', 'authelia') | first).State == 'running'
      - (headscale_authelia_compose_res.containers | selectattr('Service', 'equalto', 'tailscale-router') | first).State == 'running'
    fail_msg: "One or more core containers are not running after deploy"

- name: Assert Traefik service running (when deployed)
  ansible.builtin.assert:
    that:
      - "'traefik' in (headscale_authelia_compose_res.containers | map(attribute='Service'))"
      - (headscale_authelia_compose_res.containers | selectattr('Service', 'equalto', 'traefik') | first).State == 'running'
    fail_msg: "Traefik container is not running after deploy"
  when: headscale_authelia_deploy_traefik | default(false) | bool
