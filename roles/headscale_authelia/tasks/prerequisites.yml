---
# Prerequisites - User creation and system configuration

- name: Ensure stack user exists
  ansible.builtin.user:
    name: "{{ headscale_authelia_stack_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  register: headscale_authelia_stack_user_info

- name: Get stack user UID and GID
  ansible.builtin.set_fact:
    headscale_authelia_service_uid: "{{ headscale_authelia_stack_user_info.uid }}"
    headscale_authelia_service_gid: "{{ headscale_authelia_stack_user_info.group }}"
    headscale_authelia_service_user: "{{ headscale_authelia_stack_user }}"

- name: Enable IPv4 forwarding (runtime)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: true

- name: Enable IPv6 forwarding (runtime)
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: '1'
    state: present
    reload: true

- name: Persist IP forwarding across reboots
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: true
    mode: '0644'
  loop:
    - { regexp: '^net.ipv4.ip_forward', line: 'net.ipv4.ip_forward = 1' }
    - { regexp: '^net.ipv6.conf.all.forwarding', line: 'net.ipv6.conf.all.forwarding = 1' }
