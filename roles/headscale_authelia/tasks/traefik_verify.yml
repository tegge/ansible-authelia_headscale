---
# Traefik Integration Verification
# Handles both deployed Traefik (headscale_authelia_deploy_traefik=true) and external Traefik (headscale_authelia_deploy_traefik=false)
- name: Check if external Traefik network exists
  community.docker.docker_network_info:
    name: "{{ headscale_authelia_traefik_network }}"
  register: headscale_authelia_traefik_network_info
  failed_when: false
  when: not headscale_authelia_deploy_traefik | default(false) | bool

- name: Fail if external Traefik network does not exist
  ansible.builtin.fail:
    msg: |
      Traefik network '{{ headscale_authelia_traefik_network }}' NOT FOUND

      This network is required for Headscale and Authelia to connect to your existing Traefik instance.

      Please ensure:
      1. Your Traefik stack is running
      2. The network '{{ headscale_authelia_traefik_network }}' exists
      3. Traefik has Docker provider enabled

      Alternatively, set headscale_authelia_deploy_traefik: true to deploy Traefik with this stack.

      Configure in: group_vars/all/vars.yml
        headscale_authelia_traefik_network: "{{ headscale_authelia_traefik_network }}"
  when:
    - not headscale_authelia_deploy_traefik | default(false) | bool
    - not headscale_authelia_traefik_network_info.exists

- name: Get external Traefik container IP
  ansible.builtin.shell:
    cmd: "docker inspect traefik -f '{{ '{{' }}.NetworkSettings.Networks.{{ headscale_authelia_traefik_network }}.IPAddress{{ '}}' }}'"
  register: headscale_authelia_traefik_ip_result
  changed_when: false
  failed_when: false
  when: not headscale_authelia_deploy_traefik | default(false) | bool

- name: Set Traefik container IP variable (external mode)
  ansible.builtin.set_fact:
    headscale_authelia_traefik_container_ip: "{{ headscale_authelia_traefik_ip_result.stdout | trim }}"
  when:
    - not headscale_authelia_deploy_traefik | default(false) | bool
    - headscale_authelia_traefik_ip_result.rc == 0
    - headscale_authelia_traefik_ip_result.stdout | trim | length > 0

- name: Display external Traefik integration status
  ansible.builtin.debug:
    msg:
      - "Using EXTERNAL Traefik instance"
      - "Traefik network: {{ headscale_authelia_traefik_network }}"
      - "Certificate resolver: {{ headscale_authelia_traefik_certresolver }}"
      - "{% if headscale_authelia_traefik_container_ip is defined %}Traefik container IP: {{ headscale_authelia_traefik_container_ip }}{% endif %}"
      - ""
      - "Services will be accessible at:"
      - "  - https://{{ headscale_authelia_hostname }} (Headscale)"
      - "  - https://{{ headscale_authelia_auth_hostname }} (Authelia)"
  when: not headscale_authelia_deploy_traefik | default(false) | bool

# ==============================================================================
# DEPLOYED TRAEFIK MODE (headscale_authelia_deploy_traefik=true)
# ==============================================================================

- name: Display deployed Traefik configuration
  ansible.builtin.debug:
    msg:
      - "Deploying Traefik WITH this stack"
      - "Traefik image: {{ headscale_authelia_traefik_image }}"
      - "Traefik network: {{ headscale_authelia_traefik_network }} (will be created)"
      - "Certificate resolver: {{ headscale_authelia_traefik_certresolver }}"
      - "ACME email: {{ headscale_authelia_traefik_acme_email }}"
      - "{% if headscale_authelia_traefik_acme_staging %}WARNING: Using Let's Encrypt STAGING server{% endif %}"
      - ""
      - "Ports:"
      - "  - HTTP:  {{ headscale_authelia_traefik_http_port }}"
      - "  - HTTPS: {{ headscale_authelia_traefik_https_port }}"
      - ""
      - "Services will be accessible at:"
      - "  - https://{{ headscale_authelia_hostname }} (Headscale)"
      - "  - https://{{ headscale_authelia_auth_hostname }} (Authelia)"
  when: headscale_authelia_deploy_traefik | default(false) | bool

- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ headscale_authelia_service_user }}"
    group: "{{ headscale_authelia_service_user }}"
    mode: "0755"
  loop:
    - "{{ headscale_authelia_volumes_dir }}/traefik"
    - "{{ headscale_authelia_volumes_dir }}/traefik/acme"
  when: headscale_authelia_deploy_traefik | default(false) | bool

- name: Create empty acme.json with correct permissions
  ansible.builtin.file:
    path: "{{ headscale_authelia_volumes_dir }}/traefik/acme/acme.json"
    state: touch
    owner: "{{ headscale_authelia_service_user }}"
    group: "{{ headscale_authelia_service_user }}"
    mode: "0600"
    modification_time: preserve
    access_time: preserve
  when: headscale_authelia_deploy_traefik | default(false) | bool
