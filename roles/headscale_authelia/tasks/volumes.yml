---
# Volume Management

- name: Display warning if headscale_authelia_force_wipe_volumes is enabled
  ansible.builtin.debug:
    msg:
      - "WARNING: headscale_authelia_force_wipe_volumes is set to true!"
      - "This will DELETE all existing data including:"
      - "  - Headscale database and registered nodes"
      - "  - Authelia database and user sessions"
      - "  - All keys and certificates"
      - "  - Tailscale router state"
      - "Proceeding in 10 seconds... Press Ctrl+C to abort."
  when: headscale_authelia_force_wipe_volumes | default(false) | bool

- name: Pause before wiping volumes
  ansible.builtin.pause:
    seconds: 10
  when: headscale_authelia_force_wipe_volumes | default(false) | bool

- name: Stop all containers before wiping volumes
  community.docker.docker_compose_v2:
    project_src: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}"
    files:
      - "{{ headscale_authelia_stack_name }}.yml"
    state: stopped
  when: headscale_authelia_force_wipe_volumes | default(false) | bool
  failed_when: false

- name: Wipe volume directories (when headscale_authelia_force_wipe_volumes is true)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ headscale_authelia_volumes_dir }}/headscale/lib"
    - "{{ headscale_authelia_volumes_dir }}/headscale/config"
    - "{{ headscale_authelia_volumes_dir }}/authelia"
    - "{{ headscale_authelia_volumes_dir }}/tailscale"
  when: headscale_authelia_force_wipe_volumes | default(false) | bool

- name: Create base and sub-volume directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ headscale_authelia_service_user }}"
    group: "{{ headscale_authelia_service_user }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ headscale_authelia_volumes_dir }}" }
    - { path: "{{ headscale_authelia_volumes_dir }}/headscale/config" }
    - { path: "{{ headscale_authelia_volumes_dir }}/headscale/lib" }
    - { path: "{{ headscale_authelia_volumes_dir }}/headscale/run" }
    - { path: "{{ headscale_authelia_volumes_dir }}/authelia" }
    - { path: "{{ headscale_authelia_volumes_dir }}/tailscale" }
    - { path: "{{ headscale_authelia_certs_dir }}" }
    - { path: "{{ headscale_authelia_base_data_dir }}/{{ headscale_authelia_stack_name }}" }
