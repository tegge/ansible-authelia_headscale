---
# Headscale + Authelia Stack Deployment
# Main entry point for deploying the VPN stack

- name: Deploy Headscale + Authelia stack
  hosts: docker_host
  become: true

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - headscale_authelia_hostname is defined
          - headscale_authelia_auth_hostname is defined
          - headscale_authelia_jwt_secret is defined
          - headscale_authelia_session_secret is defined
          - headscale_authelia_storage_encryption_key is defined
          - headscale_authelia_oidc_client_secret is defined
          - headscale_authelia_auth_users | length > 0
        fail_msg: >
          Required variables are missing or invalid. Please check:
          - headscale_authelia_hostname, headscale_authelia_auth_hostname (domain names)
          - headscale_authelia_jwt_secret, headscale_authelia_session_secret
          - headscale_authelia_storage_encryption_key
          - headscale_authelia_oidc_client_secret
          - headscale_authelia_auth_users (at least one user defined)

  roles:
    - role: headscale_authelia
